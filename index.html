  // ── Read-only Schedule Matrix (Schedule mode) ──────────────────────────────
  // Renders one matrix per visible School × Calendar combination using the selected
  // Planning Guide's Calendar + Staffing Hours data. Hours match the Calendar breakdown
  // popup exactly (same resolution: per-school Special Day column, Week A/B, byCalendar).
  function renderScheduleMatrices(g, $panel){
    _shiftRegistry.length = 0; // rebuilt as shifts are rendered below; conflicts recomputed at the end
    var det = getGuideDetail(g.id);
    var sopts = det.staffingOpts || {alternateWeeks:false,bySchool:false,byCalendar:false};
    var sfSlots = det.staffingHoursSlots || {};
    var siteRows = det.siteRows || [];
    var calRows = det.calendarRows || [];
    var roles = rolesToStaffingRoles(getRoles(g.id)).map(function(r){ return {key:r.key,label:r.label,countKey:r.countKey}; });

    // ── local date + hours helpers (self-contained; mirror the Calendar breakdown) ──
    function parseD(s){ return s?new Date(s+'T00:00:00'):null; }
    function isoD(d){ return d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate(); }
    function addDays(d,n){ var x=new Date(d); x.setDate(x.getDate()+n); return x; }
    function toMonday(d){ var dow=d.getDay(); return addDays(d, dow===0?-6:1-dow); }
    function calcH(s,e){ if(!s||!e)return null; var sp=s.split(':'),ep=e.split(':'); var sm=parseInt(sp[0])*60+(parseInt(sp[1])||0),em=parseInt(ep[0])*60+(parseInt(ep[1])||0); return em>sm?(Math.round((em-sm)/60*100)/100):null; }
    function calcAdjH(d){ var raw=calcH(d.start,d.end); if(raw===null)return null; if(d.brk&&d.brk.type==='nonbillable'){ var mins=parseInt(d.brk.mins)||0; var adj=Math.round((raw-mins/60)*100)/100; return adj<0?0:adj; } return raw; }
    // Billable / Non-Billable / Break-alert status for a staffing cell. Mirrors the
    // Staffing Hours break label EXACTLY (same thresholds + colors green/blue/red);
    // only the wording differs for Schedule mode. The non-billable case shows ONLY the meal-break
    // length, e.g. "(30m)" — the word "Non-Billable" is intentionally omitted (adjusted hours
    // already exclude the break). Billable shows "Billable"; Break alert shows "Break".
    // Break alert = a shift longer than 5h with no meal break configured.
    function brkStatus(d){
      if(d.brk && d.brk.type==='billable')    return {text:'Billable', color:STATUS_COLORS.billable};
      if(d.brk && d.brk.type==='nonbillable') return {text:'('+(parseInt(d.brk.mins)||0)+'m)', color:STATUS_COLORS.nonbillable};
      var raw=calcH(d.start,d.end);
      if(raw!==null && raw>5)                 return {text:'Break', color:STATUS_COLORS.break};
      return null;
    }
    function decH(hhmm){ if(!hhmm)return null; var p=hhmm.split(':'); return parseInt(p[0])+(parseInt(p[1]||'0')/60); }
    function slotKey2(si,ci,wk){ return (si!==null?'s'+si:'')+(ci!==null?'c'+ci:'')+(wk||''); }
    function markerSdId(dateKey, si){ var m=det.calMarkers&&det.calMarkers[dateKey]; return (m&&m.schools)?(m.schools[String(si)]||null):null; }
    var DOWKEY=['sun','mon','tue','wed','thu','fri','sat'];
    function hrsLabel(h){ var r=Math.round(h*100)/100; var s=Number.isInteger(r)?String(r):r.toFixed(2).replace(/0+$/,'').replace(/\.$/,''); return s+(r===1?' hour':' hours'); }

    // Visible-period dates (intersected per-calendar with its date range below)
    function visibleDates(){
      if(viewMode==='week') return getWeekDays();
      if(viewMode==='month') return getMonthDays();
      return [new Date(viewYear,viewMonth,viewDay)];
    }
    var vDates = visibleDates();

    // ab-week parity for a date within a calendar (mirrors Calendar render: wi%2 over Monday-weeks)
    function abWeekFor(origIdx, dateObj){
      if(!sopts.alternateWeeks) return '';
      var cr=calRows[origIdx]; var fd=cr?parseD(cr.firstDay):null;
      if(!fd) return 'a';
      var wi=Math.round((toMonday(dateObj).getTime()-toMonday(fd).getTime())/(7*86400000));
      return (wi%2===0)?'a':'b';
    }

    // Resolve one school × calendar × date → {noHours, sd, blocks:[{roleKey,label,start,end,count,hrsEach}]}
    function resolveDay(si, origIdx, dateObj){
      var dateKey=isoD(dateObj);
      var dayKey=DOWKEY[dateObj.getDay()];
      var abWeek=abWeekFor(origIdx, dateObj);
      var byCal=sopts.byCalendar, byAB=sopts.alternateWeeks;
      var anyOpt=sopts.bySchool||byCal||byAB;
      var ci=(byCal && origIdx!=null)?origIdx:null;
      var wk=byAB?(abWeek||'a'):'';
      var slot = anyOpt ? (sfSlots[slotKey2(sopts.bySchool?si:null, ci, wk)]||{}) : (det.staffingHours||{});
      var sdId=markerSdId(dateKey, si);
      var sd=sdId?getSdById(g.id, sdId):null;
      if(sd && sd.noHours) return {noHours:true, sd:sd, blocks:[]};
      var srcKey=(sd && !sd.noHours)?sd.id:dayKey;
      var siteRow=siteRows[si]||{};
      var out=[];
      roles.forEach(function(role){
        var cnt=parseInt(siteRow[role.countKey])||0; if(!cnt) return;
        var d=(slot[role.key]&&slot[role.key][srcKey])||{start:'',end:''};
        var h=calcAdjH(d); if(!h||h<=0) return;
        out.push({roleKey:role.key, label:role.label, start:d.start, end:d.end, count:cnt, hrsEach:h, status:brkStatus(d), brk:d.brk});
      });
      return {noHours:false, sd:sd, blocks:out};
    }

    // Role-instance rows for a school (expanded by count; only count>0; labels match Staffing Hours)
    function roleInstances(si){
      var siteRow=siteRows[si]||{}; var out=[];
      roles.forEach(function(role){ var cnt=parseInt(siteRow[role.countKey])||0; for(var i=1;i<=cnt;i++) out.push({roleKey:role.key, roleLabel:role.label, num:i}); });
      return out;
    }

    // Visible schools / calendars (respect filters), as {idx,id,name,color}
    var calsAll=schedGuideCalendars(g), schsAll=schedGuideSchools(g);
    var visCals = schedFilterCalendar ? calsAll.filter(function(c){return String(c.id)===String(schedFilterCalendar);}) : calsAll;
    var visSchs = schedFilterSchool   ? schsAll.filter(function(s){return String(s.id)===String(schedFilterSchool);}) : schsAll;

    var $wrap=$('<div>').css({marginTop:'14px'});

    if(!siteRows.length || !schsAll.length){
      $wrap.append($('<div>').css({padding:'24px 8px',fontSize:'12px',color:'var(--tx2)'}).text('No schools in this Planning Guide’s Site Breakdown.'));
      $panel.append($wrap); return;
    }
    if(!calRows.filter(function(c){return parseD(c.firstDay)&&parseD(c.lastDay);}).length){
      $wrap.append($('<div>').css({padding:'24px 8px',fontSize:'12px',color:'var(--tx2)'}).text('No program calendars defined for this Planning Guide.'));
      $panel.append($wrap); return;
    }

    var anyMatrix=false;

    visCals.forEach(function(cal){
      var origIdx=cal.idx;
      var cr=calRows[origIdx]; if(!cr) return;
      var fd=parseD(cr.firstDay), ld=parseD(cr.lastDay); if(!fd||!ld||fd>ld) return;
      var datesInRange=vDates.filter(function(d){ var dd=new Date(d.getFullYear(),d.getMonth(),d.getDate()); return dd>=fd && dd<=ld; });

      visSchs.forEach(function(sch){
        var si=sch.idx;
        var insts=roleInstances(si);

        // Total hours over the visible period + SD usage for the header
        var totalHours=0, sdIdsSeen={}, inRangeCount=0;
        datesInRange.forEach(function(d){
          var r=resolveDay(si, origIdx, d); inRangeCount++;
          var key = r.sd ? r.sd.id : '__none__'; sdIdsSeen[key]=(sdIdsSeen[key]||0)+1;
          if(!r.noHours) r.blocks.forEach(function(b){ totalHours += b.hrsEach*b.count; });
        });
        // Special Day label + color only when uniform across all in-range visible dates (covers Day view)
        var sdLabel='', sdColor='', seenKeys=Object.keys(sdIdsSeen);
        if(inRangeCount>0 && seenKeys.length===1 && seenKeys[0]!=='__none__'){ var _sd=getSdById(g.id, seenKeys[0]); if(_sd){ sdLabel=_sd.name; sdColor=_sd.color||'#ffffff'; } }

        anyMatrix=true;
        var $mx=$('<div>').css({marginBottom:'22px',border:'1px solid #e3e7ec',borderRadius:'10px',overflow:'hidden',background:'#fff'});

        // Header: School ●(calendar) Calendar  ●(special day) Special Day   ·  N hours
        // Each color circle sits immediately before the name it belongs to. The Special Day circle
        // uses the Special Day's own source-of-truth color (getSdById → sd.color), matched to the
        // style used for Special Day circles elsewhere (Calendar cells, Special Days dropdown).
        var $h=$('<div>').css({display:'flex',alignItems:'center',gap:'8px',padding:'9px 12px',background:'#f7f9fc',borderBottom:'1px solid #e9ecef',flexWrap:'wrap'});
        var $title=$('<span>').css({display:'inline-flex',alignItems:'center',gap:'6px',flexWrap:'wrap',fontSize:'12px',fontWeight:'700',color:'#212529'});
        $title.append($('<span>').text(sch.name));
        $title.append($('<span>').css({width:'10px',height:'10px',borderRadius:'50%',background:cal.color||'#cfd6df',border:'1px solid rgba(0,0,0,.15)',flexShrink:'0',display:'inline-block'}));
        $title.append($('<span>').text(cal.name));
        if(sdLabel){
          $title.append($('<span>').css({width:'10px',height:'10px',borderRadius:'50%',background:sdColor||'#ffffff',border:'1px solid rgb(180,180,180)',flexShrink:'0',display:'inline-block'}));
          $title.append($('<span>').text(sdLabel));
        }
        // Day view has no date column to tint, so mark "today" with a subtle pill when the
        // selected day is the actual current date (week/month tint today's column instead).
        if(viewMode==='day' && isTodayDate(getCurDate())){
          $title.append($('<span>').css({fontSize:'9px',fontWeight:'700',color:'#1565d8',background:'#e3edfb',border:'1px solid #aecbf0',borderRadius:'10px',padding:'1px 7px',letterSpacing:'.03em',flexShrink:'0'}).text('Today'));
        }
        $h.append($title);
        $h.append($('<span>').css({fontSize:'11px',fontWeight:'600',color:'#0d6efd',marginLeft:'auto'}).text(hrsLabel(totalHours)));
        $mx.append($h);

        if(!insts.length){
          $mx.append($('<div>').css({padding:'16px 12px',fontSize:'11.5px',color:'var(--tx2)'}).text('No staffed roles (all counts are 0) for this school.'));
        } else if(!datesInRange.length){
          $mx.append($('<div>').css({padding:'16px 12px',fontSize:'11.5px',color:'var(--tx2)'}).text('This calendar has no days in the selected '+viewMode+'.'));
        } else if(viewMode==='day'){

    if(!anyMatrix){

    // ── DAY view: roles × 6am–midnight timeline (same look as the Availability day grid) ──

    function buildDayGrid(si, origIdx, dateObj, insts, schoolName, calendarName){

      var $hdrRow=$('<div>').css({display:'flex',height:'36px'});

      $thead.append($hr); $tbl.append($thead);
      var $tbody=$('<tbody>');
      insts.forEach(function(inst,ri){

        var $numCell=$('<div>').css({flexShrink:'0',width:'46px',textAlign:'center',padding:'0 4px',fontWeight:'700',color:'#495057',borderLeft:'1px solid #eef1f4'}).text(inst.num);
        $rTdIn.append($roleCell).append($numCell);
        $rTd.append($rTdIn); $tr.append($rTd);
        dayCols.forEach(function(col){
          var isWknd=(col.date.getDay()===0||col.date.getDay()===6), isTod=isTodayDate(col.date);
          var $td=$('<td>').css({border:'1px solid #eef1f4',borderLeft:isTod?'2px solid #7faae2':'1px solid #eef1f4',borderRight:isTod?'2px solid #7faae2':'1px solid #eef1f4',padding:'3px 4px',textAlign:'center',verticalAlign:'middle',background:isTod?'#edf4fc':(isWknd?'#fbfcfe':'#fff')});
          if(sepTop) $td.css('borderTop', sepTop);

  function rScheduleMode(){
    // Hide the staff-timeline schedule UI — Schedule mode is now guide-driven
    $('#timeline-header,#grid-body,#week-container').hide();
    $('#timeline-area').hide();
    $('#summary-bar').hide();
    $('#blocks-layer').empty();

    // Left column: start directly with the Search Guides field (no header label).
    $('#staff-col-header').empty().hide();

    var $search=$('#staff-search').val(schedSearchFilter).attr('placeholder','Search Guides…');
    $search.off('input.sched input.pg').on('input.sched',function(){
      schedSearchFilter=$(this).val().trim();
      renderSchedGuideList();
    });

    $('#staff-col').show();
    $('#planning-panel').hide().css('display','none');
    $('#people-panel').hide();
    $('#schedule-panel').css({display:'flex',flexDirection:'column'});

    // Restore selection + filters from the URL (planning_guide / school / calendar)
    try{
      var params=new URLSearchParams(window.location.search);
      var gid=params.get('planning_guide');
      if(gid){
        var found=PLANNING_GUIDES.find(function(g){return g.id===gid;});
        if(found) selectedGuideId=found.id;
      }
      var sParam=params.get('school'), cParam=params.get('calendar');
      if(sParam!==null) schedFilterSchool=sParam;
      if(cParam!==null) schedFilterCalendar=cParam;

      // Resolve the starting date ONCE per schedule-mode entry. If the URL omits the `day`
      // parameter, default to today (user's local date); otherwise honor the URL day. After
      // this first pass the date is owned by the nav controls, so we don't re-read it on the
      // re-renders triggered by Day/Week/Month or prev/next.
      if(!_schedDateInit){
        var vParam=params.get('view');
        if(vParam==='week'||vParam==='month'||vParam==='day') viewMode=vParam;
        var dayParam=params.get('day');
        if(dayParam){
          var dp=String(dayParam).split('-');
          if(dp.length===3){
            var dy=parseInt(dp[0]), dm=parseInt(dp[1])-1, dd=parseInt(dp[2]);
            if(!isNaN(dy)&&!isNaN(dm)&&!isNaN(dd)){ viewYear=dy; viewMonth=dm; viewDay=dd; }
          }
        } else {
          var _today=new Date();
          viewYear=_today.getFullYear(); viewMonth=_today.getMonth(); viewDay=_today.getDate();
        }
        _schedDateInit=true;
      }
    }catch(e){}

    var selGuide=selectedGuideId?PLANNING_GUIDES.find(function(g){return g.id===selectedGuideId;}):null;

    // Keep the Day/Week/Month toggle + date navigation in sync (matrix supports all three views).
    // Runs after the date is resolved so it reflects today's default on first entry.
    $('#btn-day,#btn-week,#btn-month').removeClass('active');
    $('#btn-'+viewMode).addClass('active');
    if(viewMode==='week'){ $('#date-label').text(weekRangeLabel()); $('#today-badge').removeClass('active'); }
    else if(viewMode==='month'){ $('#date-label').text(monthRangeLabel()); $('#today-badge').removeClass('active'); }
    else {
      $('#date-label').text(fmtD(getCurDate()));
      var _now=new Date();
      $('#today-badge').toggleClass('active', viewYear===_now.getFullYear()&&viewMonth===_now.getMonth()&&viewDay===_now.getDate());
    }

    // Drop any URL filter values that don't belong to the selected guide, then re-sync the URL
    schedValidateFilters(selGuide);
    renderSchedGuideList();
    populateSchedFilters(selGuide);
    renderSchedulePanel(selGuide);
    schedUpdateURL(true); // replaceState: normalize the URL without adding history noise
  }


  // ── Google Calendar–style time picker ──
  (function(){
    var TIMES=[];
    for(var h=0;h<24;h++) for(var m=0;m<60;m+=15){
      var hd=h===0?12:h>12?h-12:h;
      var ampm=h<12?'am':'pm';
      TIMES.push({val:(h<10?'0':'')+h+':'+(m<10?'0':'')+m, label:hd+':'+(m<10?'0':'')+m+ampm});
    }
    window._PICKER_TIMES=TIMES;

    function parseTime(s){
      if(!s) return null;
      s=s.trim().toLowerCase().replace(/\s+/g,'');
      var m=/^(\d{1,2}):?(\d{2})?\s*(am|pm)?$/.exec(s);
      if(!m) return null;
      var h=parseInt(m[1]),min=parseInt(m[2]||'0'),ap=m[3];
      if(h>23||min>59) return null;
      if(ap==='pm'&&h!==12) h+=12;
      if(ap==='am'&&h===12) h=0;
      if(!ap&&h<7) h+=12; // no meridiem: 1-6 → pm heuristic
      h=Math.min(h,23); min=Math.min(min,59);
      return (h<10?'0':'')+h+':'+(min<10?'0':'')+min;
    }
    function fmtTime(val24){
      if(!val24) return '';
      var p=val24.split(':'),h=parseInt(p[0]),m=parseInt(p[1]);
      var hd=h===0?12:h>12?h-12:h;
      return hd+':'+(m<10?'0':'')+m+(h<12?'am':'pm');
    }
    window._PICKER_PARSE=parseTime;
    window._PICKER_FMT=fmtTime;
    window._PICKER_TIMES=TIMES;
  })();

  function mkTimePicker(val24,onChange){
    var _val=val24||'';
    var _open=false;
    var _hideT=null;

    var _tpRaf=null;
    function _tpTrack(){ if(_open){ positionDd(); _tpRaf=requestAnimationFrame(_tpTrack); } else { _tpRaf=null; } }
    var $wrap=$('<div>').css({position:'relative',display:'inline-block',width:'56px'});
    var $inp=$('<input type="text" autocomplete="off" placeholder="—">').css({
      width:'56px',border:'1px solid #dde3ea',borderRadius:'4px',background:'#f7f9fc',
      fontSize:'11px',textAlign:'left',outline:'none',padding:'2px 8px',
      boxSizing:'border-box',boxShadow:'inset 0 1px 2px rgba(0,0,0,.06)',cursor:'pointer'
    }).css({width:'56px'}).val(window._PICKER_FMT(_val));

    var $dd=$('<div>').css({
      position:'fixed',zIndex:'999999',background:'#fff',
      border:'1px solid #dee2e6',borderRadius:'6px',
      boxShadow:'0 4px 14px rgba(0,0,0,.15)',

    function positionDd(){
      var r=$inp[0].getBoundingClientRect();
      $dd.css({top:(r.bottom+2)+'px',left:r.left+'px',width:'100px'});
    }

    function buildDd(filter){
      $dd.empty();
      var fl=(filter||'').toLowerCase().trim();
      var times=window._PICKER_TIMES;
      times.forEach(function(t){
        if(fl&&t.label.indexOf(fl)<0) return;
        var isSel=(t.val===_val);
        var $item=$('<div>').css({
          padding:'5px 12px',cursor:'pointer',fontWeight:isSel?'700':'400',
          background:isSel?'#1a73e8':'#fff',color:isSel?'#fff':'#212529',

        }).text(t.label);
        $item.on('mouseenter',function(){ if(!isSel) $(this).css({background:'#f1f3f4'}); })
             .on('mouseleave',function(){ if(!isSel) $(this).css({background:'#fff'}); })
             .on('mousedown',function(e){
               e.preventDefault();
               if(_hideT){clearTimeout(_hideT);_hideT=null;}
               _val=t.val;
               $inp.val(t.label).css({'border-color':'#dde3ea','background':'#f7f9fc','color':'#212529'});
               $dd.hide(); _open=false; if(_tpRaf){cancelAnimationFrame(_tpRaf);_tpRaf=null;}
               $(document).off('click._tp_'+_uid);
               onChange&&onChange(_val);
             });
        $dd.append($item);
        if(isSel){
          setTimeout(function(){$item[0]&&$item[0].scrollIntoView({block:'nearest'});},0);
        } else if(!_val && t.val==='09:00'){
          setTimeout(function(){$item[0]&&$item[0].scrollIntoView({block:'start'});},0);
        }
      });
      if(!$dd.children().length) $dd.append($('<div>').css({padding:'8px 12px',color:'#adb5bd',fontSize:'11px'}).text('No matches'));
    }

    var _uid=Math.random().toString(36).slice(2);
    $('body').append($dd);

    $inp.on('focus',function(){
      $(this).css({background:'#fff','border-color':'#1a73e8','box-shadow':'0 0 0 2px rgba(26,115,232,.2)','inset 0 1px 2px rgba(0,0,0,.04)':''});
      positionDd(); buildDd(''); $dd.show(); _open=true;
      if(_tpRaf) cancelAnimationFrame(_tpRaf);
      _tpRaf=requestAnimationFrame(_tpTrack);
      $(document).on('click._tp_'+_uid, function(e){
        if(!$(e.target).closest($dd).length && !$(e.target).is($inp)){ $dd.hide(); _open=false; if(_tpRaf){cancelAnimationFrame(_tpRaf);_tpRaf=null;} $(document).off('click._tp_'+_uid); }
      });
    }).on('input',function(){
      positionDd(); buildDd($(this).val()); $dd.show();
    }).on('keydown',function(e){
      if(e.key==='Escape'){ $dd.hide(); _open=false; if(_tpRaf){cancelAnimationFrame(_tpRaf);_tpRaf=null;} $(document).off('click._tp_'+_uid); }
      if(e.key==='Enter'){
        var parsed=window._PICKER_PARSE($(this).val());
        if(parsed){ _val=parsed; $inp.val(window._PICKER_FMT(parsed)).css({color:'#212529','border-color':'#dde3ea'}); onChange&&onChange(_val); }
        else { $inp.css({'border-color':'#dc3545'}); }
        $dd.hide(); _open=false; if(_tpRaf){cancelAnimationFrame(_tpRaf);_tpRaf=null;}
      }
    }).on('blur',function(){
      _hideT=setTimeout(function(){
        var parsed=window._PICKER_PARSE($inp.val());
        if(parsed&&parsed!==_val){ _val=parsed; $inp.val(window._PICKER_FMT(parsed)).css({color:'#212529'}); onChange&&onChange(_val); }
        else if(!parsed&&$inp.val().trim()){ $inp.css({'border-color':'#dc3545'}); }
        else if(!$inp.val().trim()){ _val=''; onChange&&onChange(''); }
        $inp.css({background:'#f7f9fc','border-color':'#dde3ea'});
        $dd.hide(); _open=false; if(_tpRaf){cancelAnimationFrame(_tpRaf);_tpRaf=null;}
        $(document).off('click._tp_'+_uid);
      }, 200);
    });

    $wrap.append($inp);
    $wrap._val=function(){ return _val; };
    $wrap._setVal=function(v){ _val=v; $inp.val(window._PICKER_FMT(v)); };
    return $wrap;
  }

  // ── Default special days ──
  var DEFAULT_SPECIAL_DAYS=[

  function getSpecialDays(gid){

  // Build the DAYS array for a guide: special days (noHours=false) then Mon-Sun

              {k:'thu',l:'Thursday'},{k:'fri',l:'Friday'},{k:'sat',l:'Saturday'},{k:'sun',l:'Sunday'});

  // Convert guideRoles → the ROLES shape used by buildStaffingSection / showCalTooltip

  function buildStaffingSection(g){
    var DAYS=buildDaysArray(g.id);
    var ROLES=rolesToStaffingRoles(getRoles(g.id));

    // Init data
    if(!guideDetails[String(g.id)]) guideDetails[String(g.id)]={};
    if(!guideDetails[String(g.id)].staffingHours) guideDetails[String(g.id)].staffingHours={};
    // Init staffing options first — used throughout function
    if(!guideDetails[String(g.id)]) guideDetails[String(g.id)]={};
    if(!guideDetails[String(g.id)].staffingOpts) guideDetails[String(g.id)].staffingOpts={alternateWeeks:false,bySchool:false,byCalendar:false};
    var sopts=guideDetails[String(g.id)].staffingOpts;
    if(sopts.byCalendar===undefined) sopts.byCalendar=false;

    if(!guideDetails[String(g.id)].staffingHoursA) guideDetails[String(g.id)].staffingHoursA={};
    if(!guideDetails[String(g.id)].staffingHoursB) guideDetails[String(g.id)].staffingHoursB={};
    var _shMain=guideDetails[String(g.id)].staffingHours;
    var _shA=guideDetails[String(g.id)].staffingHoursA;
    var _shB=guideDetails[String(g.id)].staffingHoursB;
    var sh=sopts.alternateWeeks?_shA:_shMain;
    // Seed Week A from main if first time enabling A/B
    if(sopts.alternateWeeks && Object.keys(_shA).length===0 && Object.keys(_shMain).length>0){
      guideDetails[String(g.id)].staffingHoursA=JSON.parse(JSON.stringify(_shMain));
      _shA=guideDetails[String(g.id)].staffingHoursA; sh=_shA;
    }
    // Grand-total suffix: 'a' when A/B, '' otherwise
    var _sfx=sopts.alternateWeeks?'-a':'';

    var _pickers={}; // {roleKey: {dayKey: {start:$picker, end:$picker}}}

    // Shared action menu for time copy
    var $stMenu=$('<div class="sf-action-menu">').css({position:'fixed',zIndex:'999999',background:'#fff',border:'1px solid #dee2e6',borderRadius:'6px',boxShadow:'0 4px 12px rgba(0,0,0,.15)',padding:'4px',display:'none',fontSize:'12px'});
    $('body').append($stMenu);
    function closeStMenu(){ $stMenu.hide(); $(document).off('click._stmenu'); }
    ROLES.forEach(function(r){ if(!sh[r.key]) sh[r.key]={}; DAYS.forEach(function(d){ if(!sh[r.key][d.k]) sh[r.key][d.k]={start:'',end:''}; }); });

    function getCounts(){
      var rows=(guideDetails[String(g.id)].siteRows)||[];
      var t={};
      ROLES.forEach(function(r){ t[r.countKey]=0; });
      rows.forEach(function(r){ ROLES.forEach(function(role){ t[role.countKey]+=(parseInt(r[role.countKey])||0); }); });
      return t;
    }

    function calcHours(start,end){
      if(!start||!end) return null;
      var sp=start.split(':'),ep=end.split(':');
      var sm2=parseInt(sp[0])*60+(parseInt(sp[1])||0);
      var em=parseInt(ep[0])*60+(parseInt(ep[1])||0);
      if(em<=sm2) return null;
      return Math.round((em-sm2)/60*100)/100;
    }

    // Returns {raw, adjusted} — adjusted subtracts the meal break (in hours) when
    // a non-billable break is applied. d2.brk = {type:'billable'|'nonbillable', mins:N}
    function calcAdjustedHours(d2){
      var raw=calcHours(d2.start,d2.end);
      if(raw===null) return {raw:null,adjusted:null};
      var adjusted=raw;
      if(d2.brk && d2.brk.type==='nonbillable'){
        var mins=parseInt(d2.brk.mins)||0;
        adjusted=Math.round((raw-mins/60)*100)/100;
        if(adjusted<0) adjusted=0;
      }
      return {raw:raw,adjusted:adjusted};
    }

      function ddClose(){ $dd.hide(); if(_raf){cancelAnimationFrame(_raf);_raf=null;} $(document).off('mousedown.'+_uid); }

          $lbl.text('Billable').css('color',STATUS_COLORS.billable).show();

      function buildDD(){

    }

    $section.on('remove',function(){ $stMenu.remove(); closeStMenu(); });
    return $section;
  }


  // ── Google Calendar–style date picker ──
  function mkDatePicker(initVal, onChange, opts){
    var MLONG=['January','February','March','April','May','June','July','August','September','October','November','December'];
    var MSHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var DSHORT=['S','M','T','W','T','F','S'];
    opts=opts||{};

    var _val=initVal||'';
    var _uid='dp'+Math.random().toString(36).slice(2);

    function parseSel(s){
      if(!s)return null;
      var p=s.split('-');
      return{y:parseInt(p[0]),m:parseInt(p[1])-1,d:parseInt(p[2])};
    }
    function fmtDisp(s){
      if(!s)return'';
      var sel=parseSel(s);
      if(!sel)return'';
      return MSHORT[sel.m]+' '+sel.d+', '+sel.y;
    }
    function toISO(y,m,d){ return y+'-'+(m+1<10?'0':'')+(m+1)+'-'+(d<10?'0':'')+d; }

    var _sel=parseSel(_val);
    var _now=new Date(); _now.setHours(0,0,0,0);
    var _vy=_sel?_sel.y:_now.getFullYear();
    var _vm=_sel?_sel.m:_now.getMonth();

    var $wrap=$('<div>').css({position:'relative',display:'inline-block'});
    var $inp=$('<input type="text" autocomplete="off">').css(Object.assign({
      border:'1px solid #dde3ea',borderRadius:'4px',background:'#f7f9fc',
      fontSize:'12px',padding:'3px 8px',outline:'none',cursor:'pointer',
      boxSizing:'border-box',boxShadow:'inset 0 1px 2px rgba(0,0,0,.06)',
      width:opts.width||'130px'
    },opts.inputCss||{})).val(fmtDisp(_val)).attr('placeholder',opts.placeholder||'Select date').attr('readonly',true);

    var $popup=$('<div>').css({
      position:'fixed',zIndex:'999999',background:'#fff',border:'1px solid #dadce0',
      borderRadius:'8px',boxShadow:'0 2px 10px rgba(0,0,0,.2)',padding:'12px 16px',
      width:'240px',display:'none',fontFamily:'inherit',userSelect:'none'
    });
    $('body').append($popup);

    function posPopup(){
      var r=$inp[0].getBoundingClientRect();
      var top=r.bottom+4, left=r.left;
      if(left+244>window.innerWidth) left=window.innerWidth-248;
      if(top+280>window.innerHeight) top=r.top-284;
      $popup.css({top:top+'px',left:left+'px'});
    }

    function renderCal(){
      $popup.empty();
      // Header
      var $hdr=$('<div>').css({display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px'});
      var $title=$('<span>').css({fontWeight:'600',fontSize:'13px',color:'#3c4043'}).text(MLONG[_vm]+' '+_vy);
      function navBtn(ch){
        return $('<button type="button">').css({background:'none',border:'none',cursor:'pointer',
          borderRadius:'50%',width:'28px',height:'28px',display:'flex',alignItems:'center',
          justifyContent:'center',fontSize:'16px',color:'#5f6368',lineHeight:'1',padding:'0'})
          .html(ch)
          .on('mouseenter',function(){$(this).css('background','#f1f3f4');})
          .on('mouseleave',function(){$(this).css('background','none');});
      }
      var $prev=navBtn('&#8249;').on('click',function(e){e.stopPropagation();_vm--;if(_vm<0){_vm=11;_vy--;}renderCal();});
      var $next=navBtn('&#8250;').on('click',function(e){e.stopPropagation();_vm++;if(_vm>11){_vm=0;_vy++;}renderCal();});
      $hdr.append($prev,$title,$next);
      $popup.append($hdr);

      // Day headers
      var $dhdr=$('<div>').css({display:'grid',gridTemplateColumns:'repeat(7,1fr)',marginBottom:'2px'});
      DSHORT.forEach(function(d){
        $dhdr.append($('<div>').css({textAlign:'center',fontSize:'10px',color:'#70757a',fontWeight:'500',padding:'2px 0'}).text(d));
      });
      $popup.append($dhdr);

      // Grid
      var $grid=$('<div>').css({display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'1px'});
      var firstDow=new Date(_vy,_vm,1).getDay();
      var lastDate=new Date(_vy,_vm+1,0).getDate();
      // Prev month fill
      for(var i=0;i<firstDow;i++) $grid.append(mkCell(new Date(_vy,_vm,1-(firstDow-i)),true));
      // Current month
      for(var d=1;d<=lastDate;d++) $grid.append(mkCell(new Date(_vy,_vm,d),false));
      // Next month fill
      var total=firstDow+lastDate;
      var rem=total%7===0?0:7-(total%7);
      for(var i=1;i<=rem;i++) $grid.append(mkCell(new Date(_vy,_vm+1,i),true));
      $popup.append($grid);
    }

    function mkCell(date,other){
      var isToday=date.getTime()===_now.getTime();
      var sel=parseSel(_val);
      var isSel=sel&&date.getFullYear()===sel.y&&date.getMonth()===sel.m&&date.getDate()===sel.d;
      var $cell=$('<div>').css({display:'flex',alignItems:'center',justifyContent:'center',padding:'2px 0',cursor:'pointer'});
      var $inner=$('<div>').css({
        width:'28px',height:'28px',borderRadius:'50%',display:'flex',
        alignItems:'center',justifyContent:'center',fontSize:'12px',
        fontWeight:isSel||isToday?'600':'400',
        background:isSel?'#1a73e8':isToday?'#e8f0fe':'transparent',
        color:isSel?'#fff':other?'#b0b8c1':isToday?'#1a73e8':'#3c4043'
      }).text(date.getDate());
      $cell.append($inner);
      if(!isSel){
        $cell.on('mouseenter',function(){$inner.css('background',isToday?'#d2e3fc':'#f1f3f4');});
        $cell.on('mouseleave',function(){$inner.css('background',isToday?'#e8f0fe':'transparent');});
      }
      $cell.on('click',function(e){e.stopPropagation();
        _val=toISO(date.getFullYear(),date.getMonth(),date.getDate());
        _vy=date.getFullYear(); _vm=date.getMonth();
        $inp.val(fmtDisp(_val));
        closePopup();
        onChange&&onChange(_val);
      });
      return $cell;
    }

    var _dpRaf=null;
    function _dpTrack(){ if($popup.is(':visible')){ posPopup(); _dpRaf=requestAnimationFrame(_dpTrack); } else { _dpRaf=null; } }
    function openPopup(){ posPopup(); renderCal(); $popup.show();
      if(_dpRaf) cancelAnimationFrame(_dpRaf);
      _dpRaf=requestAnimationFrame(_dpTrack);
      setTimeout(function(){
        $(document).on('click._dp_'+_uid,function(e){
          if(!$(e.target).closest($popup).length&&!$(e.target).is($inp)) closePopup();
        });
      },0);
    }
    function closePopup(){ $popup.hide(); $(document).off('click._dp_'+_uid); if(_dpRaf){cancelAnimationFrame(_dpRaf);_dpRaf=null;} }

    $inp.on('click',function(e){ e.stopPropagation(); if($popup.is(':visible')) closePopup(); else openPopup(); });
    $inp.on('focus',function(){$(this).css({'border-color':'#1a73e8','background':'#fff','box-shadow':'0 0 0 2px rgba(26,115,232,.2)'});});
    $inp.on('blur',function(){$(this).css({'border-color':'#dde3ea','background':'#f7f9fc','box-shadow':'inset 0 1px 2px rgba(0,0,0,.06)'});});

    $wrap.append($inp);
    $wrap.getVal=function(){ return _val; };
    $wrap.setVal=function(v){ _val=v; _sel=parseSel(v); $inp.val(fmtDisp(v)); if(_sel){_vy=_sel.y;_vm=_sel.m;} };
    $wrap.destroy=function(){ $popup.remove(); $(document).off('click._dp_'+_uid); };
    return $wrap;
  }

  function buildCalendarSection(g){
    // Read guide's staffing options (needed for A/B alternation)
    var sopts=(guideDetails[String(g.id)]&&guideDetails[String(g.id)].staffingOpts)||{alternateWeeks:false,bySchool:false,byCalendar:false};

    var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
    var MSHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var DAY_COLS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

    function parseD(s){ return s?new Date(s+'T00:00:00'):null; }
    function fmtDate(d){ return MSHORT[d.getMonth()]+' '+d.getDate(); }
    function addDays(d,n){ var r=new Date(d); r.setDate(r.getDate()+n); return r; }
    function toMonday(d){ var dow=d.getDay(); return addDays(d, dow===0?-6:1-dow); }
    function toSunday(d){ var dow=d.getDay(); return addDays(d, dow===0?0:7-dow); }
    function isoDate(d){ return d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate(); }

    var det=getGuideDetail(g.id);
    // Use calendarRows from Calendar Setup; fall back to legacy firstDay/lastDay for backward compatibility
    var _calRows=(guideDetails[String(g.id)]&&guideDetails[String(g.id)].calendarRows)||[];
    // Filter to valid rows
    var _validCalRows=_calRows.filter(function(cr){ var f=parseD(cr.firstDay),l=parseD(cr.lastDay); return f&&l&&f<=l; });
    // Backward-compat: if no calendarRows at all but legacy firstDay/lastDay exist, synthesize one
    if(_calRows.length===0 && det.firstDay && det.lastDay){
      _validCalRows=[{name:'',firstDay:det.firstDay,lastDay:det.lastDay}];
    }

    // Marker store
    if(!guideDetails[String(g.id)]) guideDetails[String(g.id)]={};
    if(!guideDetails[String(g.id)].calMarkers) guideDetails[String(g.id)].calMarkers={};
    var markers=guideDetails[String(g.id)].calMarkers;

    // Migrate markers to the per-school shape: markers[dateKey] = {schools:{schoolIdxStr: sdId}}
    // Old shapes handled: {type:'holiday'|'noSchool'|'minDay'} and {sdId:'sd-xxx'} (single, all-schools)
    (function(){
      var sds=getSpecialDays(g.id);
      var typeToId={'holiday':'sd-holiday','noSchool':'sd-noschool','minDay':'sd-minday'};
      var _siteRowsNow=(guideDetails[String(g.id)].siteRows)||[];
      var _nSchools=_siteRowsNow.length;
      Object.keys(markers).forEach(function(dk){
        var m=markers[dk];
        if(!m) return;
        if(m.schools) return; // already migrated
        var resolvedSdId=null;
        if(m.type && typeToId[m.type]) resolvedSdId=typeToId[m.type];
        else if(m.sdId) resolvedSdId=m.sdId;
        if(!resolvedSdId){ delete markers[dk]; return; }
        // Apply the resolved Special Day to every existing school (or the no-school sentinel)
        var schoolsMap={};
        if(_nSchools>0){ for(var i=0;i<_nSchools;i++) schoolsMap[String(i)]=resolvedSdId; }
        else schoolsMap['_none_']=resolvedSdId;
        markers[dk]={schools:schoolsMap};
      });
    })();

    // Returns the sdId applied to a given school index (or '_none_' when there are no schools) for a date.
    // schoolIdx may be a number or the string '_none_'.
    function getMarkerSdId(dateKey, schoolIdx){
      var m=markers[dateKey];
      if(!m||!m.schools) return null;
      return m.schools[String(schoolIdx)]||null;
    }
    // Returns {sdId: count} of all distinct Special Days applied across schools for a date.
    function getMarkerSdCounts(dateKey){
      var m=markers[dateKey];
      var counts={};
      if(!m||!m.schools) return counts;
      Object.keys(m.schools).forEach(function(k){
        var sdId=m.schools[k];
        if(!sdId) return;
        counts[sdId]=(counts[sdId]||0)+1;
      });
      return counts;
    }
    // Returns the list of school indices (as numbers, or ['_none_']) currently configured for this guide
    function getSchoolIndices(){
      var _sr=(guideDetails[String(g.id)].siteRows)||[];
      if(!_sr.length) return ['_none_'];
      var out=[]; for(var i=0;i<_sr.length;i++) out.push(i); return out;
    }

    // ── Calendar header element builder ──
    // Returns a <span> containing the calendar name (bold) and, when dates are
    // present, the ":: Start – End, Year" range in a lighter style.
    var _FULL_MONTHS_HD=['January','February','March','April','May','June','July','August','September','October','November','December'];
    function buildCalHeaderEl(rawName, firstDayStr, lastDayStr, idx, color){
      var name=(rawName&&rawName.trim())||('Calendar '+(idx+1));
      var $wrap=$('<span>').css({display:'inline-flex',alignItems:'center',gap:'5px',verticalAlign:'middle'});
      // Color circle
      var _c=color||'#ffffff';
      $wrap.append($('<span>').css({width:'10px',height:'10px',background:_c,border:'1px solid rgb(180,180,180)',borderRadius:'50%',display:'inline-block',flexShrink:'0',verticalAlign:'middle'}));
      $wrap.append($('<span>').css({fontWeight:'700',color:'#212529'}).text(name));
      var fd2=firstDayStr?new Date(firstDayStr+'T00:00:00'):null;
      var ld2=lastDayStr ?new Date(lastDayStr +'T00:00:00'):null;
      if(fd2&&ld2&&!isNaN(fd2)&&!isNaN(ld2)){
        var fMon=_FULL_MONTHS_HD[fd2.getMonth()], fDay=fd2.getDate(), fYear=fd2.getFullYear();
        var lMon=_FULL_MONTHS_HD[ld2.getMonth()], lDay=ld2.getDate(), lYear=ld2.getFullYear();
        var dateRange=fYear===lYear
          ? fMon+' '+fDay+' \u2013 '+lMon+' '+lDay+', '+lYear
          : fMon+' '+fDay+', '+fYear+' \u2013 '+lMon+' '+lDay+', '+lYear;
        $wrap.append($('<span>').css({fontWeight:'400',color:'#6c757d',marginLeft:'4px'}).text('\u00a0::\u00a0 '+dateRange));
      }
      return $wrap;
    }

    var $section=$('<div class="card border-0 shadow-sm rounded-2 mt-2" style="overflow:visible;width:fit-content;min-width:100%;">').attr('id','cal-section-'+g.id);

    // Single-calendar: name + date range in the main card header
    // Multi-calendar: main header stays plain "Calendar"; each block gets its own sub-header
    var $hd=$('<div class="px-3 py-2 text-dark" style="font-size:12px;background:#f8f9fb;border-bottom:1px solid #e9ecef;border-radius:calc(.375rem - 1px) calc(.375rem - 1px) 0 0;display:flex;align-items:baseline;gap:0;flex-wrap:wrap;">');
    if(_validCalRows.length===1){
      $hd.append(buildCalHeaderEl(_validCalRows[0].name,_validCalRows[0].firstDay,_validCalRows[0].lastDay,0,_validCalRows[0].color));
    } else {
      $hd.append($('<span>').css({fontWeight:'700',color:'#212529'}).text('Calendar'));
    }
    $section.append($hd);

    if(!_validCalRows.length){
      $section.append($('<div class="px-3 py-3 text-muted" style="font-size:12px;">').text('Add a calendar in Calendar Setup with a valid First Day and Last Day to generate the calendar.'));
      return $section;
    }

    var BDR='1px solid #dee2e6';
    var TH_CSS={border:BDR,background:'#f0f4f8',fontWeight:'700',textAlign:'center',padding:'5px 8px',fontSize:'10px',color:'#495057',whiteSpace:'nowrap'};
    var STRIPE='repeating-linear-gradient(135deg,#e0e0e0 0px,#e0e0e0 2px,transparent 2px,transparent 8px)';
    var WKND_STRIPE='repeating-linear-gradient(135deg,#c8d8eb 0px,#c8d8eb 2px,transparent 2px,transparent 8px)';

    // Shared context menu
    var $ctxMenu=$('<div class="cal-ctx-menu">').css({position:'fixed',zIndex:'999999',background:'#fff',border:'1px solid #dee2e6',borderRadius:'6px',boxShadow:'0 4px 12px rgba(0,0,0,.15)',minWidth:'140px',maxHeight:'70vh',overflowY:'auto',padding:'4px',display:'none',fontSize:'12px'});
    $('body').append($ctxMenu);
    var _ctxRaf=null;
    var _ctxAnchor=null; // {x,y,$dots} or {$td} used to recompute position on scroll/resize
    function closeCtx(){
      $ctxMenu.hide();
      $('.sch-pick-pop').remove(); // remove any per-school Special Day picker popups
      $(document).off('click._cal_ctx').off('contextmenu._cal_ctx');
      $(window).off('scroll._cal_ctx resize._cal_ctx');
      $('#planning-panel').off('scroll._cal_ctx');
      if(_ctxRaf){ cancelAnimationFrame(_ctxRaf); _ctxRaf=null; }
      _ctxAnchor=null;
    }
    function posCtxMenu(){
      if(!_ctxAnchor||!$ctxMenu[0]||$ctxMenu[0].style.display==='none'){ return; }
      var mw=$ctxMenu[0].offsetWidth||220;
      var mh=$ctxMenu[0].offsetHeight||160;
      if(!mw||!mh) return; // not laid out yet — bail so we don't snap to top-left
      var r=_ctxAnchor.getBoundingClientRect();
      // If the anchor is hidden/detached its rect is all-zeros — keep the last position
      if(r.width===0 && r.height===0 && r.top===0 && r.left===0) return;
      var vw=window.innerWidth, vh=window.innerHeight, MARGIN=8, GAP=4;
      // The "…" label sits at the cell's TOP-RIGHT corner (top:2px, right:3px).
      var dotsX=r.right;     // ≈ horizontal position of the "…" label
      var dotsY=r.top+2;     // ≈ top of the "…" label
      var tx, ty;
      // ── Preferred: open to the RIGHT of the "…", with the dropdown's top-left at the label ──
      if(dotsX+GAP+mw <= vw-MARGIN){
        tx=dotsX+GAP;
      } else if(r.left-GAP-mw >= MARGIN){
        // Not enough room right → open to the LEFT of the cell
        tx=r.left-GAP-mw;
      } else {
        // Neither side fits → align left edge with the cell, clamp into viewport
        tx=Math.max(MARGIN, Math.min(r.left, vw-mw-MARGIN));
      }
      // Vertically align the dropdown's top with the "…" label; flip up if it overflows
      ty=dotsY;
      if(ty+mh > vh-MARGIN){
        var aboveY=(r.bottom)-mh; // bottom-align to the cell so it stays attached
        ty=(aboveY>=MARGIN)?aboveY:Math.max(MARGIN, vh-mh-MARGIN);
      }
      if(ty<MARGIN) ty=MARGIN;
      $ctxMenu.css({top:ty+'px',left:tx+'px'});
    }
    function menuItem(label,danger,cb){
      var $item=$('<div>').css({padding:'6px 12px',cursor:'pointer',borderRadius:'4px',color:danger?'#dc3545':'#212529',fontWeight:'400'})
        .text(label)
        .on('mouseenter',function(){$(this).css('background',danger?'#fff5f5':'#f1f3f4');})
        .on('mouseleave',function(){$(this).css('background','none');})
        .on('click',function(e){e.stopPropagation();closeCtx();cb();});
      return $item;
    }
    // Like menuItem but prepends a small color circle for Special Day entries.
    // selState: 'none' | 'all' (applied to every selected school) | 'partial' (some schools)
    // count: number of schools currently with this Special Day applied (for the partial label)
    function sdMenuItem(sd,sdIdx,cb,selState,count){
      selState=selState||'none';
      var selBg=(selState==='all')?'#e7f0fd':(selState==='partial')?'#f0f5fb':'none';
      var $item=$('<div>').css({padding:'5px 12px',cursor:'pointer',borderRadius:'4px',color:'#212529',fontWeight:(selState!=='none')?'600':'400',display:'flex',alignItems:'center',gap:'7px',background:selBg});
      var $circle=$('<span>').css({width:'10px',height:'10px',background:sd.color||'#ffffff',border:'1px solid rgb(180,180,180)',borderRadius:'50%',display:'inline-block',flexShrink:'0'});
      $item.append($circle,$('<span>').css({flex:'1'}).text(sdName(sd,sdIdx)));
      // Right-side indicator: ✓ when applied to all, "N school(s)" when applied to some
      var $ind=$('<span>').css({marginLeft:'auto',display:'inline-flex',alignItems:'center'});
      $item.append($ind);
      function renderInd(st,cnt){
        $ind.empty();
        if(st==='all'){
          $ind.append($('<span>').css({fontSize:'11px',color:'#1a73e8',fontWeight:'700'}).html('&#10003;'));
        } else if(st==='partial'){
          $ind.append($('<span>').css({fontSize:'9.5px',color:'#6c757d',fontWeight:'600',whiteSpace:'nowrap'}).text(cnt+' school'+(cnt===1?'':'s')));
        }
      }
      renderInd(selState,count||0);
      // Hover restores to the SELECTED background (not 'none') so the saved state isn't lost
      $item.on('mouseenter',function(){$(this).css('background',(selState!=='none')?'#dbe7fb':'#f1f3f4');});
      $item.on('mouseleave',function(){$(this).css('background',selBg);});
      $item.on('click',function(e){e.stopPropagation();closeCtx();cb();});
      // Allow live updates of the highlight + count as checkboxes change
      $item.data('updateSel',function(st,cnt){
        selState=st||'none';
        selBg=(selState==='all')?'#e7f0fd':(selState==='partial')?'#f0f5fb':'none';
        $item.css({background:selBg,fontWeight:(selState!=='none')?'600':'400'});
        renderInd(selState,cnt||0);
      });
      return $item;
    }

    function openActionMenu(dateKey,$td,anchorEl,inRange){
      closeCtx(); $ctxMenu.empty();
      if(!inRange) return;
      // Close any open Staffing Hours "…" menu, Break popup, or Calendar breakdown popup
      $('.sf-action-menu').hide();
      $('.brk-dd').hide();
      hideCalTooltip();
      var sds=getSpecialDays(g.id);
      var _siteRowsNow=(guideDetails[String(g.id)].siteRows)||[];
      var schoolIdxs=getSchoolIndices();           // [0,1,2,…] or ['_none_']
      var showSchoolList=_siteRowsNow.length>1;

      // ── Staged draft of per-school Special Day selections (committed only on Apply) ──
      // _draft[schoolIdxStr] = sdId | undefined
      var _draft={};
      schoolIdxs.forEach(function(si){ var v=getMarkerSdId(dateKey,si); if(v) _draft[String(si)]=v; });
      var _dirty=false;

      // Live registries for in-place updates
      var _sdLabelEls={};   // sdId → {$row, update(count)}
      var _circleEls={};    // schoolIdxStr → {$circle, set(sdId)}

      function draftCount(sdId){
        var c=0; schoolIdxs.forEach(function(si){ if(_draft[String(si)]===sdId) c++; }); return c;
      }
      function refreshCounts(){
        Object.keys(_sdLabelEls).forEach(function(sdId){ _sdLabelEls[sdId].update(draftCount(sdId)); });
        if(typeof refreshClearBtn==='function') refreshClearBtn();
      }
      function markDirty(){ if(!_dirty){ _dirty=true; if($applyBtn) $applyBtn.css('display',''); } }

      // ── Top: Special Day labels with live school counts ──
      sds.forEach(function(sd,sdIdx){
        var $row=$('<div>').css({display:'flex',alignItems:'center',gap:'6px',padding:'3px 12px',cursor:'pointer',borderRadius:'4px'});
        var $circle=$('<span>').css({width:'10px',height:'10px',background:sd.color||'#ffffff',border:'1px solid rgb(180,180,180)',borderRadius:'50%',display:'inline-block',flexShrink:'0'});
        var $name=$('<span>').css({flex:'1',fontSize:'12px'}).text(sdName(sd,sdIdx));
        var $cnt=$('<span>').css({fontSize:'9.5px',color:'#6c757d',fontWeight:'600',whiteSpace:'nowrap',marginLeft:'auto'});
        $row.append($circle,$name,$cnt);
        function updateCount(c){
          if(c>0){ $cnt.text(c+' school'+(c===1?'':'s')); $row.css({background:'#eef4fd',fontWeight:'600'}); }
          else { $cnt.text(''); $row.css({background:'none',fontWeight:'400'}); }
        }
        updateCount(draftCount(sd.id));
        $row.on('mouseenter',function(){$(this).css('background','#e3edfb');}).on('mouseleave',function(){updateCount(draftCount(sd.id));});
        $row.on('click',function(e){
          e.stopPropagation();
          // Apply this Special Day to ALL schools in the draft
          schoolIdxs.forEach(function(si){ _draft[String(si)]=sd.id; });
          schoolIdxs.forEach(function(si){ if(_circleEls[String(si)]) _circleEls[String(si)].set(sd.id); });
          refreshCounts(); markDirty();
        });
        _sdLabelEls[sd.id]={$row:$row,update:updateCount};
        $ctxMenu.append($row);
      });

      // ── Middle: per-school list (only when >1 school) ──
      var $schList=null;

        _siteRowsNow.forEach(function(sr,si){

          // Circle — same size/border/radius as the top Special Day label circles (10×10)

          function setCircle(sdId){

          var $pick=$('<div>').css({position:'fixed',zIndex:'1000000',background:'#fff',border:'1px solid #dee2e6',borderRadius:'6px',boxShadow:'0 4px 12px rgba(0,0,0,.16)',padding:'3px',display:'none',fontSize:'12px',minWidth:'130px'});

            // Clear / None
            var $clear=$('<div>').css({display:'flex',alignItems:'center',gap:'6px',padding:'5px 9px',cursor:'pointer',borderRadius:'4px',color:'#6c757d',borderTop:'1px solid #f0f0f0',marginTop:'2px'});
            $clear.append($('<span>').css({width:'10px',height:'10px',background:'#fff',border:'1px solid rgb(180,180,180)',borderRadius:'50%',display:'inline-block',flexShrink:'0'}),$('<span>').text('Clear / None'));

            $pick.append($clear);

          function openPick(e){

      }

      // ── Bottom: Close / Clear / Apply buttons ──
      var $btnRow=$('<div>').css({display:'flex',justifyContent:'flex-start',gap:'6px',padding:'7px 12px 4px',borderTop:'1px solid #e9ecef',marginTop:'4px'});
      var $closeBtn=$('<button type="button">').text('Close').css({fontSize:'11px',padding:'4px 12px',background:'none',color:'#6c757d',border:'1px solid #dee2e6',borderRadius:'5px',cursor:'pointer'});
      // Clear — shown only when at least one school currently has a Special Day in the draft
      var $clearBtn=$('<button type="button">').text('Clear').css({fontSize:'11px',padding:'4px 12px',background:'none',color:'#dc3545',border:'1px solid #f1c2c7',borderRadius:'5px',cursor:'pointer',display:'none'});
      var $applyBtn=$('<button type="button">').text('Apply').css({fontSize:'11px',padding:'4px 14px',background:'#1a73e8',color:'#fff',border:'none',borderRadius:'5px',cursor:'pointer',fontWeight:'600',display:'none'});
      function _draftHasAny(){ return Object.keys(_draft).some(function(k){ return !!_draft[k]; }); }
      function refreshClearBtn(){ $clearBtn.css('display', _draftHasAny() ? '' : 'none'); }
      $closeBtn.on('click',function(e){ e.stopPropagation(); closeCtx(); }); // discard — never commit
      $clearBtn.on('click',function(e){
        e.stopPropagation();
        // Remove every Special Day from every school in the draft
        Object.keys(_draft).forEach(function(k){ delete _draft[k]; });

        Object.keys(_circleEls).forEach(function(k){ _circleEls[k].set(null); });
        refreshCounts();      // clears the counts at the top
        refreshClearBtn();    // hide Clear now that nothing is applied
        markDirty();          // reveal Apply so the cleared state can be committed
      });
      $applyBtn.on('click',function(e){
        e.stopPropagation();
        // Commit the draft to the real markers
        if(!markers[dateKey]) markers[dateKey]={schools:{}};
        markers[dateKey].schools={};
        Object.keys(_draft).forEach(function(k){ if(_draft[k]) markers[dateKey].schools[k]=_draft[k]; });
        if(!Object.keys(markers[dateKey].schools).length) delete markers[dateKey];
        refreshCell($td,dateKey,inRange,false);

      $btnRow.append($closeBtn,$clearBtn,$applyBtn);
      $btnRow.on('click mousedown',function(e){ e.stopPropagation(); });
      $ctxMenu.append($btnRow);

      if(!$ctxMenu.children().length) return;
      _ctxAnchor=anchorEl;
      // Render off-screen invisible so layout is complete before measuring
      $ctxMenu.css({minWidth:showSchoolList?'215px':'170px',width:'max-content',maxWidth:'360px',visibility:'hidden',display:'block',top:'-9999px',left:'-9999px'});
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){ // second frame: layout guaranteed complete
          if(!_ctxAnchor) return;
          posCtxMenu();               // compute real position
          $ctxMenu.css('visibility','visible'); // reveal only AFTER positioning
          if(_ctxRaf) cancelAnimationFrame(_ctxRaf);
          // Start tracking AFTER reveal so posCtxMenu never runs while top:-9999px
          _ctxRaf=requestAnimationFrame(function track(){
            if($ctxMenu[0]&&$ctxMenu[0].style.display!=='none'){
              posCtxMenu();
              _ctxRaf=requestAnimationFrame(track);
            } else {
              // Menu was hidden externally — fully clean up listeners/state
              _ctxRaf=null;
              $(document).off('click._cal_ctx').off('contextmenu._cal_ctx');
              $(window).off('scroll._cal_ctx resize._cal_ctx');
              $('#planning-panel').off('scroll._cal_ctx');
              _ctxAnchor=null;
            }
          });
        });
      });
      setTimeout(function(){
        $(document).on('click._cal_ctx',closeCtx).on('contextmenu._cal_ctx',closeCtx);
        $(window).on('scroll._cal_ctx resize._cal_ctx',posCtxMenu);
        $('#planning-panel').on('scroll._cal_ctx',posCtxMenu);
      },0);
    }

    function refreshCell($td,dateKey,inRange,isWknd){
      var sdCounts=getMarkerSdCounts(dateKey);
      var sdIds=Object.keys(sdCounts);
      var baseBg=inRange?(isWknd?'#edf3fa':'#fff'):(isWknd?WKND_STRIPE:STRIPE);

      $td.find('.cal-label').remove();

      if(sdIds.length===0){
        // No Special Day applied to any school
        $td.css({background:baseBg,color:inRange?'#212529':'#ccc'});
        $td.attr('data-orig-bg',baseBg);
      } else if(sdIds.length===1){
        var sd=getSdById(g.id,sdIds[0]);
        var totalSchools=getSchoolIndices().length;
        var appliesToAll=(sdCounts[sdIds[0]]>=totalSchools);
        if(appliesToAll){
          // Single Special Day applied to EVERY school — solid whole-cell background + plain label
          var bg=sd?sd.color:baseBg;
          $td.css({background:bg,color:inRange?'#212529':'#ccc'});
          $td.attr('data-orig-bg',bg);
          if(sd){
            var sdIdx2=getSpecialDays(g.id).indexOf(sd);
            $td.prepend($('<div class="cal-label">').attr('data-sd-id',sd.id).css({fontSize:'8px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.04em',lineHeight:'1.2',paddingBottom:'1px',color:'#495057'}).text(sdName(sd,sdIdx2)));
          }
        } else {
          // Single Special Day applied to only SOME schools — no whole-cell background;
          // show a color-coded pill label with the school count (e.g. "Min Day (1)").
          $td.css({background:baseBg,color:inRange?'#212529':'#ccc'});
          $td.attr('data-orig-bg',baseBg);
          if(sd){
            var sdIdx2b=getSpecialDays(g.id).indexOf(sd);
            $td.prepend($('<div class="cal-label">').attr('data-sd-id',sd.id).css({
              fontSize:'8px',fontWeight:'700',borderRadius:'2px',padding:'2px 4px',
              background:sd.color||'#ffffff',color:'#495057',lineHeight:'1.2',display:'block'
            }).text(sdName(sd,sdIdx2b)+' ('+sdCounts[sdIds[0]]+')'));
          }
        }
      } else {
        // Multiple distinct Special Days across schools — no cell-level background;
        // render one color-coded label per Special Day with its school count.
        $td.css({background:baseBg,color:inRange?'#212529':'#ccc'});
        $td.attr('data-orig-bg',baseBg);
        var sds=getSpecialDays(g.id);
        sdIds.forEach(function(sdId,labelIdx){
          var sd=getSdById(g.id,sdId);
          if(!sd) return;
          var sdIdx3=sds.indexOf(sd);
          var $lbl=$('<div class="cal-label">').attr('data-sd-id',sd.id).css({
            fontSize:'8px',fontWeight:'700',borderRadius:'2px',padding:'2px 4px',
            background:sd.color||'#ffffff',color:'#495057',lineHeight:'1.2',
            display:'block',marginBottom:labelIdx>0?'2px':'0'
          }).text(sdName(sd,sdIdx3)+' ('+sdCounts[sdId]+')');
          $td.prepend($lbl);
        });
        // Re-reverse so labels appear in original sdIds order (prepend reverses order)
        var $allLbls=$td.find('.cal-label').get().reverse();
        $allLbls.forEach(function(el){ $td.prepend(el); });
      }

      var dayKey=$td.attr('data-day-key');
      if(dayKey) updateCalendarCellHours($td,dateKey,dayKey);
    }

    // Pure adjusted-hours helper (defined once, reused for every cell). Computes raw
    // start→end hours minus any non-billable meal break.
    function _calcAdjHrs(d){
      if(!d||!d.start||!d.end) return 0;
      var sp=d.start.split(':'),ep=d.end.split(':');
      var sm=parseInt(sp[0])*60+(parseInt(sp[1])||0), em=parseInt(ep[0])*60+(parseInt(ep[1])||0);
      if(em<=sm) return 0;
      var raw=Math.round((em-sm)/60*100)/100;
      if(d.brk && d.brk.type==='nonbillable'){
        var mins=parseInt(d.brk.mins)||0;
        raw=Math.round((raw-mins/60)*100)/100;
        if(raw<0) raw=0;
      }
      return raw;
    }
    // Build a reusable per-guide calc context: invariants + an O(1) Special-Day lookup map.
    // Built ONCE per recalc pass and shared across all cells (instead of recomputing per cell).
    function buildCalcCtx(){
      var _gd=guideDetails[String(g.id)]||{};
      var sds=getSpecialDays(g.id);
      var sdMap={}; sds.forEach(function(s){ sdMap[s.id]=s; });
      return {
        slots:_gd.staffingHoursSlots||{},
        baseSH:_gd.staffingHours||{},
        siteRows:_gd.siteRows||[],
        roles:getRoles(g.id),
        anyOpt:sopts.bySchool||sopts.byCalendar||sopts.alternateWeeks,
        sdMap:sdMap,
        schoolIdxs:getSchoolIndices()
      };
    }

    function updateCalendarCellHours($td,dateKey,dayKey,ctx){
      var el=$td[0]||$td;
      var hrsEl=el.querySelector('.cal-hours');
      if(!hrsEl) return;
      ctx=ctx||buildCalcCtx();
      // Read week/calendar context straight off the cell (no closest('tr') DOM traversal)
      var abWeek=el.getAttribute('data-ab-week')||'';
      var calOrigIdxRaw=el.getAttribute('data-cal-orig-idx');
      var calOrigIdx=(calOrigIdxRaw!==null&&calOrigIdxRaw!=='')?parseInt(calOrigIdxRaw):null;
      var _slots=ctx.slots, _baseSH=ctx.baseSH, _siteRows=ctx.siteRows, _roles=ctx.roles;
      var _anyOpt=ctx.anyOpt, _sdMap=ctx.sdMap, schoolIdxs=ctx.schoolIdxs;
      var _wkPart=abWeek||'';
      var _ciPart=(sopts.byCalendar&&calOrigIdx!==null)?calOrigIdx:null;

      // Staffing data for a school context — own slot (bySchool on) or shared aggregate slot.
      function _slotFor(si){
        if(!_anyOpt) return _baseSH;
        var siReal=(si==='_none_')?null:si;
        var key=(sopts.bySchool&&siReal!==null?'s'+siReal:'')+(_ciPart!==null?'c'+_ciPart:'')+_wkPart;
        return _slots[key]||{};
      }
      // One school's total hours: its OWN counts × adjusted hours of its resolved column.
      function schoolDayHours(si, srcKey){
        var slot=_slotFor(si);
        var sRow=(si==='_none_'||si==null)?null:_siteRows[si];
        var t=0;
        for(var ri=0;ri<_roles.length;ri++){
          var role=_roles[ri];
          var ck=role.isCoach?'coaches_'+role.key:role.key;
          var cnt;
          if(sRow) cnt=parseInt(sRow[ck])||0;
          else { cnt=0; for(var j=0;j<_siteRows.length;j++){ if(_siteRows[j]) cnt+=parseInt(_siteRows[j][ck])||0; } }
          if(!cnt) continue;
          var rd=slot[role.key]; var d=(rd&&rd[srcKey])||null;
          if(!d) continue;
          var h=_calcAdjHrs(d);
          if(h>0) t+=h*cnt;
        }
        return t;
      }

      var total=0;
      if(schoolIdxs[0]==='_none_'){
        var sd0=_sdMap[getMarkerSdId(dateKey,'_none_')];
        if(!(sd0&&sd0.noHours)){
          var srcKey0=(sd0&&!sd0.noHours)?sd0.id:dayKey;
          total=schoolDayHours('_none_',srcKey0);
        }
      } else {
        for(var si2=0;si2<schoolIdxs.length;si2++){
          var schoolI=schoolIdxs[si2];
          var sd=_sdMap[getMarkerSdId(dateKey,schoolI)];
          if(sd&&sd.noHours) continue; // this school contributes 0 hours
          var srcKey=(sd&&!sd.noHours)?sd.id:dayKey;
          total+=schoolDayHours(schoolI,srcKey);
        }
      }

      total=Math.round(total*100)/100;
      hrsEl.textContent=total>0?(total+' hrs'):'';
    }

    function updateCalendarHours(){
      // Build the calc context ONCE and reuse it for every cell in this pass.
      var ctx=buildCalcCtx();
      var cells=$section[0]?$section[0].querySelectorAll('.cal-day-cell'):[];
      for(var i=0;i<cells.length;i++){
        var c=cells[i];
        var dateKey=c.getAttribute('data-date-key');
        var dayKey=c.getAttribute('data-day-key');
        if(!dateKey||!dayKey) continue;
        updateCalendarCellHours(c,dateKey,dayKey,ctx);
      }
    }

    // Build one calendar block per valid calendarRow
    // Track original index so fallback name ("Calendar 1", "Calendar 2"…) matches Calendar Setup position
    var _calRowsWithIdx=[];
    _calRows.forEach(function(cr,i){ var f=parseD(cr.firstDay),l=parseD(cr.lastDay); if(f&&l&&f<=l) _calRowsWithIdx.push({row:cr,origIdx:i}); });

      var weekStart=toMonday(fd), weekEnd=toSunday(ld);

      }

      var $scroll=$('<div style="overflow-x:auto;">');
      var $tbl=$('<table>').css({borderCollapse:'collapse',width:'100%',fontSize:'11px'});

      var $hr=$('<tr>');
      $hr.append($('<th>').css(Object.assign({},TH_CSS,{width:'54px',minWidth:'54px',textAlign:'center'})).text('Week'));
      $hr.append($('<th>').css(Object.assign({},TH_CSS,{width:'120px',minWidth:'120px',textAlign:'left',background:'#f8f9fb',color:'#6c757d',fontWeight:'600'})).text('Dates'));

      $tbl.append($('<thead>').append($hr));

      var $tbody=$('<tbody>');

        $tr.append((function(){
          var $wc=$('<td>').css({border:BDR,padding:'4px 6px',textAlign:'center',fontSize:'10px',fontWeight:'700',color:'#495057',background:'#f8f9fb',whiteSpace:'nowrap'});

          } else { $wc.text('Week '+(wi+1)); }

            border:BDR,padding:'3px 4px',textAlign:'left',verticalAlign:'top',

          });

          // Special day label(s)
          if(_singleAll){

            var _sdIdx=getSpecialDays(g.id).indexOf(_singleSd);
            $td.append($('<div class="cal-label">').attr('data-sd-id',_singleSd.id).css({fontSize:'8px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.04em',lineHeight:'1.2',paddingBottom:'1px',color:'#495057'}).text(sdName(_singleSd,_sdIdx)));
          } else if(sdIds0.length>=1){

            sdIds0.forEach(function(sdId,labelIdx){

          // Hours display (read-only, populated by updateCalendarHours)
          if(inRange){

      function calcH(s,e2){ if(!s||!e2)return null; var sp=s.split(':'),ep=e2.split(':'); var sm2=parseInt(sp[0])*60+(parseInt(sp[1])||0),em2=parseInt(ep[0])*60+(parseInt(ep[1])||0); return em2>sm2?(Math.round((em2-sm2)/60*100)/100):null; }

    function updateCalHeaders(){

      var _MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
      function _fmtRange(firstDayStr,lastDayStr){
        var fd=firstDayStr?new Date(firstDayStr+'T00:00:00'):null;
        var ld=lastDayStr?new Date(lastDayStr+'T00:00:00'):null;
        if(!fd||!ld||isNaN(fd)||isNaN(ld)) return null;
        var fMon=_MONTHS[fd.getMonth()],fDay=fd.getDate(),fYear=fd.getFullYear();
        var lMon=_MONTHS[ld.getMonth()],lDay=ld.getDate(),lYear=ld.getFullYear();
        return fYear===lYear
          ? fMon+' '+fDay+' \u2013 '+lMon+' '+lDay+', '+lYear
          : fMon+' '+fDay+', '+fYear+' \u2013 '+lMon+' '+lDay+', '+lYear;
      }
      function _mkHdrContent(rawName,firstDayStr,lastDayStr,idx,color){
        var name=(rawName&&rawName.trim())||('Calendar '+(idx+1));
        var $w=$('<span>').css({display:'inline-flex',alignItems:'center',gap:'5px',verticalAlign:'middle'});

        $w.append($('<span>').css({fontWeight:'700',color:'#212529'}).text(name));
        var range=_fmtRange(firstDayStr,lastDayStr);
        if(range) $w.append($('<span>').css({fontWeight:'400',color:'#6c757d',marginLeft:'4px'}).text('\u00a0::\u00a0 '+range));
        return $w;
      }
      // Target every stamped header directly by its original calendar index
      _rows.forEach(function(cr,i){
        var $hdr=$calSec.find('[data-cal-hdr-idx="'+i+'"]');
        if(!$hdr.length) return;
        $hdr.empty().append(_mkHdrContent(cr.name,cr.firstDay,cr.lastDay,i,cr.color));
      });

      function saveDistricts(){setStaffDetail(s.id,'districts',JSON.stringify(selectedDistricts));}

      var $districtTags=$('<div class="d-flex flex-column gap-1 mb-2">');
      function renderDistrictTags(){
        $districtTags.empty();
        if(!selectedDistricts.length){
          if(!isEditing) return;
          $districtTags.append($('<span style="font-size:12px;color:#adb5bd;">').text('No districts selected yet'));
          return;
        }
        selectedDistricts.forEach(function(d,idx){
          var $tag=$('<span class="d-inline-flex align-items-center rounded-pill" style="align-self:flex-start;background:#e8f4fd;color:#0a6ebd;border:1px solid #b8dff5;font-size:11px;font-weight:500;padding:3px 8px 3px 12px;gap:6px;">');
          $tag.append($('<span class="fw-semibold">').text(d.abbr));
          $tag.append($('<span style="opacity:.7;">').text('·'));
          $tag.append($('<span>').text(d.name));
          var $rm=$('<button type="button" style="background:none;border:none;padding:0 0 0 2px;line-height:1;cursor:pointer;color:#0a6ebd;font-size:14px;opacity:0.7;">').text('×');
          (function(i){$rm.on('click',function(){selectedDistricts.splice(i,1);saveDistricts();renderDistrictTags();});})(idx);
          if(isEditing)$tag.append($rm);
          $districtTags.append($tag);
        });
      }
      renderDistrictTags();

      var $districtInp=$('<input type="text" class="form-control form-control-sm mb-1" placeholder="'+(isEditing?'Search by district name or abbreviation…':'')+'" style="font-size:12px;">').prop('disabled',!isEditing).css(!isEditing?{'pointer-events':'none','background':'#f8f9fa','border-color':'transparent'}:{});
      var $districtDd=$('<div class="list-group" style="max-height:200px;overflow-y:auto;display:none;position:absolute;left:0;right:0;z-index:200;border:1px solid #dee2e6;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.12);">');
      var $districtDdWrap=$('<div style="position:relative;z-index:100;'+(isEditing?'':' display:none;')+'">').append($districtInp,$districtDd);

      function buildDistrictDropdown(query){
        $districtDd.empty();
        var q=(query||'').toLowerCase().trim();
        Object.keys(DISTRICTS_DATA).forEach(function(county){
          var items=DISTRICTS_DATA[county].filter(function(d){
            return !selectedDistricts.some(function(x){return x.name===d.name;}) &&
                   (!q||d.name.toLowerCase().includes(q)||d.abbr.toLowerCase().includes(q)||county.toLowerCase().includes(q));
          });
          if(!items.length) return;
          $districtDd.append($('<div>').css({fontSize:'9px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.07em',padding:'6px 12px 3px',color:'#6c757d',background:'#f8f9fa',borderBottom:'1px solid #e9ecef'}).text(county));
          items.forEach(function(d){
            var $item=$('<button type="button">').addClass('list-group-item list-group-item-action border-0').css({fontSize:'12px',padding:'5px 16px'});
            $item.append($('<span class="fw-semibold me-1">').text(d.abbr));
            $item.append($('<span class="text-muted" style="font-size:11px;">').text('— '+d.name));
            $item.on('mousedown',function(e){
              e.preventDefault();cancelDistrictHide();
              selectedDistricts.push({name:d.name,abbr:d.abbr});
              saveDistricts();renderDistrictTags();$districtInp.val('');$districtDd.empty().hide();$districtInp.focus();
            });
            $districtDd.append($item);
          });
        });
        // Custom add
        var q2=($districtInp.val()||'').trim();
        var allNames=Object.values(DISTRICTS_DATA).reduce(function(a,b){return a.concat(b);},[]).map(function(x){return x.name.toLowerCase();});
        if(q2&&!allNames.includes(q2.toLowerCase())&&!selectedDistricts.some(function(x){return x.name.toLowerCase()===q2.toLowerCase();})){
          var $add=$('<button type="button">').addClass('list-group-item list-group-item-action border-0').css({fontSize:'12px',padding:'5px 16px',color:'#198754',fontWeight:'600'}).text('+ Add "'+q2+'"');
          $add.on('mousedown',function(e){
            e.preventDefault();cancelDistrictHide();
            selectedDistricts.push({name:q2,abbr:q2});
            saveDistricts();renderDistrictTags();$districtInp.val('');$districtDd.empty().hide();$districtInp.focus();
          });
          $districtDd.prepend($add);
        }
        $districtDd.toggle($districtDd.children().length>0);
      }

      var _districtHideTimer=null;
      function cancelDistrictHide(){if(_districtHideTimer){clearTimeout(_districtHideTimer);_districtHideTimer=null;}}
      var $districtWrap=$('<div style="position:relative;z-index:1;grid-column:1 / -1;">').append($districtLabel,$districtTags);
      if(isEditing) $districtWrap.append($districtDdWrap);
      $districtInp.on('input',function(){cancelDistrictHide();buildDistrictDropdown($(this).val());});
      $districtInp.on('focus',function(){cancelDistrictHide();$districtWrap.css('z-index','20');buildDistrictDropdown($(this).val()||'');});
      $districtInp.on('blur',function(){_districtHideTimer=setTimeout(function(){$districtDd.hide();$districtWrap.css('z-index','1');},200);});
      $travelBody.append($districtWrap);
      $travel.append($travelHd,$travelBody);
      $wrap.append($travel);

      return $wrap;
    }

    $('#people-panel').empty().append(buildCard());
  }


  function setPageMode(m){
    pageMode=m;
    if(m!=='planning') $('#staff-search').attr('placeholder','Search staff…').off('input.pg');
    $('#btn-planning').toggleClass('active',m==='planning');
    $('#btn-people').toggleClass('active',m==='people');
    $('body').toggleClass('people-mode', m==='people');
    $('body').toggleClass('planning-mode', m==='planning');
    // Hide filter bar in non-schedule modes
    if(m==='people'||m==='planning') $('#filter-bar').hide();
    else $('#filter-bar').show();
    $('#btn-schedule').toggleClass('active',m==='schedule');
    $('#btn-availability').toggleClass('active',m==='availability');
    // Show/hide view controls — hidden in people mode
    $('.view-toggle,.date-nav').toggle(m!=='people');
    $('#summary-bar').toggle(m!=='people');
    // Hide people panel when leaving people mode
    if(m!=='people'){
      $('#people-panel').hide().css('display','none');
      if(m!=='planning'&&m!=='schedule') selectedPersonId = null;
    }
    // Planning panel hidden outside planning mode
    if(m!=='planning'){
      $('#planning-panel').hide().css('display','none');
    }
    // Schedule panel hidden outside schedule mode
    if(m!=='schedule'){
      $('#schedule-panel').hide().css('display','none');
      _schedDateInit=false; // re-resolve the starting date (URL day / today) on next entry
    }
    // selectedGuideId drives BOTH Planning and Schedule modes — only clear it when
    // switching to a guide-agnostic mode (People or Availability).
    if(m==='people'||m==='availability') selectedGuideId = null;

    if(m==='availability'){
      // Availability still uses the staff timeline
      $('#timeline-area').show();
      $('#timeline-header,#grid-body').show();
    } else if(m!=='people'&&m!=='planning'&&m!=='schedule'){
      $('#timeline-area').show();
      $('#timeline-header,#grid-body').show();
    }
    // Filter bar: legacy School/Discipline filters only in availability's old path is gone;
    // Schedule mode shows the guide-driven Calendars/Schools filters instead.
    $('#filter-school').closest('.filter-item').hide();
    $('#filter-prog').closest('.filter-item').hide();
    updateSchedFilterVisibility(); // schedule filters only when a guide is selected
    $('#filter-reset').toggle(m==='schedule' && !!selectedGuideId && (schedFilterSchool!==''||schedFilterCalendar!==''));
    availOverlay=false;
    // Remove week container so it rebuilds cleanly for the new mode
    $('#week-container').remove();
    // Empty the blocks layer so no stale schedule/avail blocks linger
    $('#blocks-layer').empty();
    // Summary bar not used in the guide-driven schedule mode
    $('#summary-bar').toggle(false);
    // Schedule mode owns its own URL sync (planning_guide / school / calendar)
    if(m!=='schedule') updateURL(false);
    render(false);
  }


  /* ── Override refreshView and render to handle availability mode ── */

  $('#btn-day').on('click',function(){
    viewMode='day';
    $(this).addClass('active');$('#btn-week').removeClass('active');$('#btn-month').removeClass('active');
    render();
  });

  $('#today-badge').on('click',function(){
    var now=new Date();
    viewYear=now.getFullYear(); viewMonth=now.getMonth(); viewDay=now.getDate();
    viewMode='day';
    $('#btn-day').addClass('active');$('#btn-week').removeClass('active');$('#btn-month').removeClass('active');
    render();
  });
  $('#btn-week').on('click',function(){
    viewMode='week';
    $(this).addClass('active');$('#btn-day').removeClass('active');$('#btn-month').removeClass('active');
    render();
  });
  $('#btn-month').on('click',function(){
    viewMode='month';
    $(this).addClass('active');$('#btn-day').removeClass('active');$('#btn-week').removeClass('active');
    render();
  });

  $('#staff-search').on('input',function(){
    staffFilter=$(this).val().trim();
    rStaff();rGrid();refreshView(true);
  });

  // Availability overlay checkbox
  $('#avail-overlay-chk').on('change', function(){
    availOverlay = $(this).is(':checked');
    $('#avail-overlay-label').toggleClass('active', availOverlay);
    refreshView(true);
  });

  // (syncOverlayCheckVisibility defined earlier)

  // Click on day-view grid to create a block for that staff/time
  $('#timeline-area').on('click', function(e){
    if(viewMode !== 'day') return;
    // Ignore clicks on blocks, buttons, handles
    if($(e.target).closest('.sched-block,.edit-btn,.resize-handle').length) return;
    // Must be clicking inside the grid body (not header)
    if(!$(e.target).closest('#grid-body').length) return;

    var $gb = $('#grid-body');
    var gbOffset = $gb.offset();
    var scrollLeft = $('#timeline-area').scrollLeft();
    var scrollTop  = $('#timeline-area').scrollTop();

    var x = e.pageX - gbOffset.left + scrollLeft;
    var y = e.pageY - gbOffset.top  + scrollTop;

    var fs = getFilteredStaff();
    var rowIdx = Math.floor(y / RH);
    if(rowIdx < 0 || rowIdx >= fs.length) return;
    var staffMember = fs[rowIdx];

    var rawHour = SH + x / HW;
    var snapped = Math.round(rawHour * 4) / 4;
    snapped = Math.max(SH, Math.min(SH + NHRS - 1, snapped));
    var endSnapped = Math.min(SH + NHRS, snapped + 1);
    var dow = new Date(viewYear, viewMonth, viewDay).getDay();

    if(pageMode === 'availability'){
      openAvailCreate({
        coach:     staffMember.n,
        date:      viewDateStr(),
        days:      [dow],
        startTime: fmtT(snapped),
        endTime:   fmtT(endSnapped),
      });
    } else {
      openCreate({
        coach:     staffMember.n,
        date:      viewDateStr(),
        days:      [dow],
        startTime: fmtT(snapped),
        endTime:   fmtT(endSnapped),
      });
    }
  });
  $('#modal-close-btn').on('click',closeModal);
  $('#modal-overlay').on('click',e=>{if($(e.target).is('#modal-overlay'))closeModal();});
  $('#prev-btn').on('click', function(){
    var d;
    if(viewMode==='month'){
      d=new Date(viewYear, viewMonth-1, 1);
    } else {
      var step=viewMode==='week'?-7:-1;
      d=new Date(viewYear,viewMonth,viewDay+step);
    }
    viewYear=d.getFullYear(); viewMonth=d.getMonth(); viewDay=d.getDate();
    render();
  });
  $('#next-btn').on('click', function(){
    var d;
    if(viewMode==='month'){
      d=new Date(viewYear, viewMonth+1, 1);
    } else {
      var step=viewMode==='week'?7:1;
      d=new Date(viewYear,viewMonth,viewDay+step);
    }
    viewYear=d.getFullYear(); viewMonth=d.getMonth(); viewDay=d.getDate();
    render();
  });
  // Two-way scroll sync: timeline ↔ staff column
  var _syncingScroll = false;
  $('#timeline-area').on('scroll', function(){
    if(_syncingScroll) return;
    _syncingScroll = true;
    $('#staff-list-scroll').scrollTop($(this).scrollTop());
    _syncingScroll = false;
  });
  $('#staff-list-scroll').on('scroll', function(){
    if(_syncingScroll) return;
    _syncingScroll = true;
    $('#timeline-area').scrollTop($(this).scrollTop());
    _syncingScroll = false;
  });
  // Backfill IDs on existing blocks that don't have them yet
  blocks.forEach(function(b){
    if(!b.progId){   var p=progByName(b.lbl);   if(p) b.progId=p.id; }
    if(!b.coachId){  var c=coachByName(b.coach)||staffByName(b.coach); if(c) b.coachId=c.id; }
    if(!b.schoolId){ var s=schoolByName(b.school); if(s) b.schoolId=s.id; }
  });
  loadFromURL();
  render(true); // true = replace state on initial load

  $('#btn-schedule').on('click',function(){if(pageMode!=='schedule') setPageMode('schedule');});
  $('#btn-availability').on('click',function(){if(pageMode!=='availability') setPageMode('availability');});
  $('#btn-planning').on('click',function(){if(pageMode!=='planning') setPageMode('planning');});
  $('#btn-people').on('click',function(){if(pageMode!=='people') setPageMode('people');});

  
});
</script>
